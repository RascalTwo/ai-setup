<style>
  :root{
    --rail-w: 300px;
    --glass: color-mix(in srgb, var(--panel) 72%, transparent);
  }
  *{ box-sizing:border-box; }
  html,body{ height:100%; margin:0; }
  body{
    background:
      radial-gradient(1100px 620px at 82% -8%, color-mix(in srgb, var(--accent) 12%, transparent), transparent 60%),
      radial-gradient(900px 520px at -6% 108%, color-mix(in srgb, var(--c4) 12%, transparent), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:var(--sans);
    overflow:hidden;
  }
  .app{ display:grid; grid-template-rows:auto 1fr; height:100dvh; }

  /* ---- header ---- */
  header.top{
    display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;
    padding:16px 26px 14px; border-bottom:1px solid var(--border);
    background:linear-gradient(180deg, color-mix(in srgb, var(--panel) 55%, transparent), transparent);
  }
  header.top h1{ font-size:20px; margin:0; letter-spacing:.2px; }
  header.top h1 .q{ color:var(--muted); font-weight:500; }
  header.top .sub{ color:var(--muted); font-size:13px; }
  header.top .spacer{ flex:1; }
  header.top .hint{ color:var(--muted); font-size:12px; font-family:var(--mono); }
  header.top .hint kbd{
    font-family:var(--mono); background:var(--panel-2); border:1px solid var(--border);
    border-bottom-width:2px; border-radius:5px; padding:1px 6px; color:var(--text); font-size:11px;
  }

  /* ---- body layout ---- */
  .body{ display:grid; grid-template-columns:var(--rail-w) 1fr; min-height:0; }

  /* ---- rail ---- */
  nav.rail{
    border-right:1px solid var(--border); padding:16px 14px; overflow-y:auto;
    background:linear-gradient(180deg, color-mix(in srgb, var(--panel) 40%, transparent), transparent);
  }
  .rail-title{ font-size:11px; text-transform:uppercase; letter-spacing:.14em; color:var(--muted); margin:2px 8px 12px; }
  .step{
    position:relative; display:flex; gap:12px; align-items:center; width:100%;
    text-align:left; cursor:pointer; color:var(--text);
    background:transparent; border:1px solid transparent; border-radius:11px;
    padding:9px 11px; margin:2px 0; font:inherit; transition:background .15s, border-color .15s, transform .1s;
  }
  .step:hover{ background:var(--panel); }
  .step .chip{
    flex:none; width:26px; height:26px; border-radius:8px; display:grid; place-items:center;
    font-family:var(--mono); font-size:12px; font-weight:600;
    background:var(--panel-2); border:1px solid var(--border); color:var(--muted);
  }
  .step .lbl{ font-size:13.5px; line-height:1.25; }
  .step.active{ background:color-mix(in srgb, var(--accent) 14%, transparent); border-color:color-mix(in srgb, var(--accent) 45%, transparent); }
  .step.active .chip{ background:var(--accent); border-color:var(--accent); color:#04121f; }
  .step.active .lbl{ color:var(--text); font-weight:600; }
  .step.seen .chip{ color:var(--accent); border-color:color-mix(in srgb, var(--accent) 45%, transparent); }
  .rail-foot{ margin:16px 8px 6px; padding-top:14px; border-top:1px solid var(--border); color:var(--muted); font-size:12px; line-height:1.5; }
  .rail-foot a{ color:var(--accent); text-decoration:none; }
  .rail-foot a:hover{ text-decoration:underline; }

  /* ---- stage ---- */
  main.stage{ position:relative; min-height:0; overflow-y:auto; padding:34px 40px 30px; }
  .watermark{
    position:absolute; top:-8px; right:26px; font-family:var(--mono); font-weight:700;
    font-size:190px; line-height:1; color:color-mix(in srgb, var(--accent) 8%, transparent);
    pointer-events:none; user-select:none; letter-spacing:-6px;
  }
  .stage-grid{ position:relative; display:grid; grid-template-columns:minmax(0,1fr) 360px; gap:34px; max-width:1080px; align-items:start; }
  .eyebrow{ display:inline-flex; align-items:center; gap:9px; color:var(--accent); font-family:var(--mono); font-size:12px; letter-spacing:.05em; margin-bottom:12px; }
  .eyebrow .dot{ width:7px; height:7px; border-radius:50%; background:var(--accent); box-shadow:0 0 0 4px color-mix(in srgb, var(--accent) 22%, transparent); }
  h2.title{ font-size:30px; line-height:1.12; margin:0 0 16px; letter-spacing:-.3px; }
  .lead{
    font-size:18.5px; line-height:1.5; color:var(--text); margin:0 0 22px;
    padding-left:16px; border-left:3px solid color-mix(in srgb, var(--accent) 60%, transparent);
  }
  .lead em{ color:var(--accent); font-style:italic; }
  ul.points{ list-style:none; margin:0; padding:0; display:grid; gap:11px; }
  ul.points li{ position:relative; padding-left:26px; font-size:14.5px; line-height:1.5; color:var(--text); }
  ul.points li::before{
    content:""; position:absolute; left:4px; top:8px; width:8px; height:8px; border-radius:2px;
    background:var(--dotc, var(--accent)); transform:rotate(45deg);
  }
  ul.points li b{ color:#fff; font-weight:600; }
  ul.points li .m{ color:var(--muted); }
  .visual{ position:sticky; top:0; }
  .visual .frame{
    background:var(--glass); border:1px solid var(--border); border-radius:16px; padding:18px;
    box-shadow:0 20px 50px -30px rgba(0,0,0,.9); backdrop-filter:blur(3px);
  }
  .visual svg{ width:100%; height:auto; display:block; }
  .visual .cap{ margin-top:10px; color:var(--muted); font-size:12px; text-align:center; font-family:var(--mono); }

  /* svg shared bits */
  .s-stroke{ stroke:var(--accent); fill:none; stroke-width:2; }
  .s-mut{ stroke:var(--muted); fill:none; stroke-width:1.6; }
  .s-fill{ fill:var(--accent); }
  .s-mfill{ fill:var(--muted); }
  .s-txt{ fill:var(--text); font-family:var(--mono); font-size:12px; }
  .s-txtm{ fill:var(--muted); font-family:var(--mono); font-size:11px; }
  .s-good{ stroke:var(--good); }
  .s-danger{ stroke:var(--danger); }
  .dash{ stroke-dasharray:5 5; }

  /* ---- creed / landing ---- */
  .creed-lead{ font-size:22px; line-height:1.45; max-width:760px; margin:0 0 8px; }
  .creed-lead b{ color:var(--accent); }
  .creed-sub{ color:var(--muted); font-size:14px; margin:0 0 26px; }
  .creed-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(250px,1fr)); gap:12px; max-width:1040px; }
  .creed-card{
    background:var(--panel); border:1px solid var(--border); border-left:3px solid var(--c-l, var(--accent));
    border-radius:11px; padding:13px 15px; font-size:14px; line-height:1.45; cursor:pointer;
    transition:transform .12s, border-color .15s, background .15s;
  }
  .creed-card:hover{ transform:translateY(-2px); background:var(--panel-2); }
  .creed-card .n{ font-family:var(--mono); font-size:11px; color:var(--muted); display:block; margin-bottom:4px; }
  .creed-card b{ color:#fff; }

  /* ---- footer nav ---- */
  .stage-foot{
    display:flex; align-items:center; gap:16px; margin:30px 0 6px; max-width:1080px;
    padding-top:18px; border-top:1px solid var(--border);
  }
  .btn{
    display:inline-flex; align-items:center; gap:8px; cursor:pointer; font:inherit; font-size:13.5px;
    background:var(--panel); color:var(--text); border:1px solid var(--border); border-radius:10px; padding:9px 15px;
    transition:background .15s, border-color .15s, opacity .15s;
  }
  .btn:hover{ background:var(--panel-2); border-color:var(--accent); }
  .btn[disabled]{ opacity:.35; pointer-events:none; }
  .btn.primary{ background:var(--accent); color:#04121f; border-color:var(--accent); font-weight:600; }
  .dots{ display:flex; gap:7px; flex:1; justify-content:center; }
  .dots button{ width:9px; height:9px; padding:0; border-radius:50%; border:none; cursor:pointer; background:var(--border); transition:background .15s, transform .15s; }
  .dots button:hover{ transform:scale(1.35); }
  .dots button.on{ background:var(--accent); }
  .counter{ color:var(--muted); font-family:var(--mono); font-size:12px; min-width:56px; text-align:right; }

  .reveal{ animation:rise .32s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes rise{ from{ opacity:0; transform:translateY(10px);} to{ opacity:1; transform:none;} }

  @media (max-width:880px){
    .body{ grid-template-columns:1fr; }
    nav.rail{ display:none; }
    .stage-grid{ grid-template-columns:1fr; }
    .visual{ position:static; order:-1; }
    .watermark{ font-size:120px; right:12px; }
    main.stage{ padding:22px 20px 26px; }
  }
</style>
</head>

<div class="app">
  <header class="top">
    <h1>How I Use AI <span class="q">— the working philosophy</span></h1>
    <div class="spacer"></div>

  <div class="body">

    <main class="stage" id="stage"></main>

</div>

<script type="module">
import { saveHash, loadHash, esc } from "/_kit/viz.js";

/* ---------- bespoke SVG metaphors (300 x 240 viewBox) ---------- */
const V = (inner) => `<svg viewBox="0 0 300 240" role="img">${inner}</svg>`;

const ART = {

  // 2 — make it yours: only your key fits
  key: V(`
    <text x="150" y="24" text-anchor="middle" class="s-txtm">only the you-shaped key fits</text>
    <path d="M150 54 a34 34 0 1 0 .1 0 M150 88 v96 M150 150 h20 M150 170 h14" class="s-stroke" stroke-width="2.4"/>
    <circle cx="150" cy="88" r="9" fill="var(--bg)" class="s-stroke"/>
    <!-- ghost keys that don't fit -->
    <g class="s-mut dash" opacity=".6">
      <path d="M58 150 a20 20 0 1 0 .1 0 M58 170 v34 M58 190 h12"/>

    <text x="150" y="214" text-anchor="middle" class="s-txt">you</text>`),

  // 3 — atrophy vs re-engaged practice
  atrophy: V(`
    <line x1="40" y1="200" x2="272" y2="200" class="s-mut"/>
    <line x1="40" y1="40" x2="40" y2="200" class="s-mut"/>
    <text x="30" y="46" text-anchor="end" class="s-txtm">skill</text>
    <path d="M40 70 C110 120, 190 165, 272 195" class="s-mut dash"/>
    <text x="250" y="212" text-anchor="middle" class="s-txtm" fill="var(--muted)">let it slide</text>

    </g>
    <text x="150" y="30" text-anchor="middle" class="s-txt">demo · talk · teach = reps back</text>`),

  // 4 — the reframe: wall vs open path
  fork: V(`
    <circle cx="52" cy="120" r="7" class="s-fill"/>
    <path d="M59 120 H120" class="s-stroke"/>
    <!-- dead end -->
    <path d="M120 120 C150 120, 168 84, 205 84" class="s-mut"/>
    <line x1="205" y1="66" x2="205" y2="102" class="s-danger" stroke-width="3"/>
    <text x="150" y="60" class="s-txtm">"do the WHOLE thing?"</text>
    <line x1="196" y1="75" x2="214" y2="93" class="s-danger" stroke-width="2"/>
    <line x1="214" y1="75" x2="196" y2="93" class="s-danger" stroke-width="2"/>
    <!-- open path -->
    <path d="M120 120 C150 120, 168 162, 262 162" class="s-stroke s-good"/>

  // 5 — lead the trail vs correct it
  trail: V(`
    <text x="150" y="22" text-anchor="middle" class="s-txtm">blaze it, then it follows</text>
    <path d="M40 150 C100 150, 200 150, 260 150" class="s-stroke" stroke-dasharray="2 9" stroke-linecap="round"/>
    <path d="M256 143 l12 7 l-12 7" class="s-fill"/>

  ladder: V(`

    <line x1="188" y1="26" x2="188" y2="220" class="s-mut"/>
    ${[0,1,2,3,4].map((i)=>{const y=200-i*40;const on=i<=2;return `<line x1="112" y1="${y}" x2="188" y2="${y}" class="${on?'s-stroke':'s-mut'}" ${on?'':'stroke-dasharray="4 4"'}/>`;}).join("")}
    <text x="100" y="206" text-anchor="end" class="s-txtm">chat</text>
    <text x="100" y="166" text-anchor="end" class="s-txtm">autocomplete</text>
    <text x="100" y="126" text-anchor="end" class="s-txt">functions</text>
    <text x="200" y="86" class="s-txtm">no specs</text>
    <text x="200" y="46" class="s-txtm">you're the user</text>
    <circle cx="150" cy="126" r="9" class="s-fill"/>
    <path d="M150 40 l-7 12 h14 z" class="s-fill"/>
    <line x1="150" y1="52" x2="150" y2="112" class="s-stroke"/>

  // 7 — retro flywheel
  flywheel: V(`
    <circle cx="150" cy="124" r="66" class="s-stroke"/>
    <path d="M150 58 a66 66 0 0 1 57 33" class="s-stroke s-good" fill="none"/>
    <path d="M201 84 l8 10 l-13 3 z" fill="var(--good)"/>

    <text x="150" y="46" text-anchor="middle" class="s-txtm">correct once</text>
    <text x="232" y="150" text-anchor="middle" class="s-txtm">codify</text>
    <text x="66" y="150" text-anchor="middle" class="s-txtm">compound</text>

    <text x="150" y="118" text-anchor="middle" class="s-txt" fill="var(--accent)">YOU</text>
    <text x="150" y="134" text-anchor="middle" class="s-txtm">the config</text>

      const px=x<150?x+30:x-30, py=y;

              <rect x="${x-30}" y="${y-15}" width="60" height="30" rx="7" class="s-mut"/>

    }).join("")}

  teach: V(`
    <path d="M74 168 c-30 0 -34 -34 -14 -46 c-6 -34 44 -46 58 -20 c26 -6 30 30 8 40 c4 20 -18 30 -30 22 z" class="s-mut"/>
    <path d="M226 168 c30 0 34 -34 14 -46 c6 -34 -44 -46 -58 -20 c-26 -6 -30 30 -8 40 c-4 20 18 30 30 22 z" class="s-stroke"/>
    <path d="M118 120 H182" class="s-stroke dash"/>
    <path d="M175 113 l12 7 l-12 7" class="s-fill"/>
    <circle cx="150" cy="120" r="6" class="s-fill"/>

    <text x="226" y="200" text-anchor="middle" class="s-txt" fill="var(--accent)">yours</text>
    <text x="150" y="34" text-anchor="middle" class="s-txtm">teach it → you know it</text>`),

/* ---------- content ---------- */
const CREED = [
  "I'm not a syntax memorizer, and I'm not Google. I'm the person who finds the solution.",
  "AI is a means to an end. I keep the <b>A</b> — accountability; I delegate the <b>R</b> — the doing.",
  "It has to work with <b>you</b>. Someone else's excellent framework is worthless if it fights your grain.",
  "If you can't teach it to someone, you don't actually know it.",
  "The better question isn't \"can AI do the whole thing?\" — it's \"why couldn't AI <b>help</b> me with that?\"",
  "Lead the trail and let it follow, rather than correcting it move by move.",
  "Retro everything. Correct it once, then make the correction permanent.",
  "Don't let perfect be the enemy of good. Past that point it's just classic engineering.",
  "The model will always eventually get something wrong. Plan for it; keep the bar on yourself.",
];

  {

const N = P.length;            // 9
const seen = new Set();

/* ---------- render ---------- */
const rail = document.getElementById("rail");
const stage = document.getElementById("stage");

function buildRail(){
  const items = [`<div class="rail-title">The journey</div>`];
  items.push(railItem(0, "0", "Thesis &amp; creed"));
  P.forEach((p,i)=> items.push(railItem(i+1, String(i+1), esc(p.title))));
  items.push(`<div class="rail-foot">Nine principles behind my whole setup.<br>Dictated out loud, then made explorable.<br><br>Alt-click anything to leave me a note.</div>`);
  rail.innerHTML = items.join("");
  rail.querySelectorAll(".step").forEach(b=> b.addEventListener("click", ()=> go(+b.dataset.i)));
}
function railItem(i, chip, lbl){
  return `<button class="step" data-i="${i}"><span class="chip">${chip}</span><span class="lbl">${lbl}</span></button>`;
}

function renderLanding(){
  return `
    <div class="reveal">
      <div class="eyebrow"><span class="dot"></span>THE ONE-PARAGRAPH VERSION</div>
      <p class="creed-lead">AI is a <b>means to an end</b> — a tool, not the solution. My job is to stay the <b>problem solver</b>; the tool does the typing. The leverage only showed up once I stopped wearing other people's setups and <b>built one that fits how I work</b> — and I keep folding my own judgment back into it.</p>
      <p class="creed-sub">The compressed version — nine one-liners. Click one to jump to its principle.</p>
      <div class="creed-grid">
        ${CREED.map((c,i)=>`
          <div class="creed-card" data-jump="${i+1}" style="--c-l:${P[i].color}">
            <span class="n">${String(i+1).padStart(2,"0")}</span>${c}
          </div>`).join("")}
      </div>
      ${footer(0)}
    </div>`;
}

function renderPrinciple(idx){
  const p = P[idx-1];
  return `
    <div class="reveal" style="--dotc:${p.color}">
      <div class="watermark">${idx}</div>
      <div class="stage-grid">
        <div>
          <div class="eyebrow"><span class="dot" style="background:${p.color};box-shadow:0 0 0 4px color-mix(in srgb, ${p.color} 22%, transparent)"></span>${String(idx).padStart(2,"0")} · ${esc(p.tag).toUpperCase()}</div>
          <h2 class="title">${esc(p.title)}</h2>
          <p class="lead">${p.lead}</p>
          <ul class="points">${p.points.map(pt=>`<li>${pt}</li>`).join("")}</ul>
        </div>
        <aside class="visual">
          <div class="frame">${ART[p.art]}<div class="cap">${esc(p.cap)}</div></div>
        </aside>
      </div>
      ${footer(idx)}
    </div>`;
}

function footer(idx){
  const dots = Array.from({length:N+1}, (_,i)=>`<button class="${i===idx?'on':''}" data-i="${i}" title="${i===0?'Thesis':esc(P[i-1].title)}"></button>`).join("");
  return `
    <div class="stage-foot">
      <button class="btn" id="prev" ${idx===0?'disabled':''}>← ${idx===0?'':'Prev'}</button>
      <div class="dots">${dots}</div>
      <button class="btn primary" id="next" ${idx===N?'disabled':''}>${idx===N?'End':'Next'} →</button>
      <span class="counter">${idx} / ${N}</span>
    </div>`;
}

let cur = 0;
function go(i){
  i = Math.max(0, Math.min(N, i));
  cur = i; seen.add(i);
  stage.innerHTML = i===0 ? renderLanding() : renderPrinciple(i);
  stage.scrollTop = 0;
  // rail state
  rail.querySelectorAll(".step").forEach(b=>{
    const bi = +b.dataset.i;
    b.classList.toggle("active", bi===i);
    b.classList.toggle("seen", seen.has(bi) && bi!==i);
  });
  // wire footer
  const prev=document.getElementById("prev"), next=document.getElementById("next");
  if(prev) prev.onclick=()=>go(i-1);
  if(next) next.onclick=()=>go(i+1);
  stage.querySelectorAll(".dots button").forEach(d=> d.onclick=()=>go(+d.dataset.i));
  stage.querySelectorAll("[data-jump]").forEach(c=> c.onclick=()=>go(+c.dataset.jump));
  saveHash({p:i});
}

document.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowRight"||e.key===" "){ e.preventDefault(); go(cur+1); }
  else if(e.key==="ArrowLeft"){ e.preventDefault(); go(cur-1); }
  else if(e.key==="Home"){ go(0); }
  else if(/^[0-9]$/.test(e.key)){ go(+e.key); }
});

buildRail();
const h = loadHash();
go(typeof h.p==="number" ? h.p : 0);
</script>
